# V2X Panel — Unified Deployment Reference
# Copy the values below into your platform's environment variables & start command.

start_command = "gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"

[env]
ADMIN_PASSWORD = "your-strong-password"
SECRET_KEY = "generate-a-random-string"
DB_PATH = "/tmp/panel.db"
DOMAIN = "your-app-domain.example.com"
