app = "v2render"
primary_region = "fra"

[build]
  [build.args]

[[services]]
  http_checks = []
  internal_port = 8080
  processes = ["app"]

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
